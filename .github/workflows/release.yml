name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri macOS
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 27.3.13750724
          cmdline-tools: latest

      - name: Setup NDK environment
        run: |
          NDK_VERSION=27.3.13750724
          NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
          if [ ! -d "$NDK_PATH" ]; then
            echo "NDK $NDK_VERSION not found, using available:"
            ls $ANDROID_HOME/ndk/
            NDK_VERSION=$(ls $ANDROID_HOME/ndk/ | sort -V | head -n1)
            NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
          fi
          echo "Using NDK: $NDK_PATH"
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Build Android APK
        run: |
          npm run tauri android build -- --apk 2>&1 || echo "Build failed, checking output"
          echo "=== Checking build output ==="
          find src-tauri/gen/android -name "*.apk" 2>/dev/null || echo "No APK found"
          ls -la src-tauri/gen/android/app/build/outputs/apk/ 2>/dev/null || echo "APK directory not found"

      - name: Sign APK
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          
          KEYTOOL_PATH="$JAVA_HOME/bin/keytool"
          APK_SIGNER_PATH="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          
          echo "keytool path: $KEYTOOL_PATH"
          echo "apksigner path: $APK_SIGNER_PATH"
          
          APK_DIR=src-tauri/gen/android/app/build/outputs/apk
          echo "APK directory: $APK_DIR"
          find "$APK_DIR" -name "*.apk" 2>/dev/null || echo "No APK files found"
          
          UNSIGNED_APK=$(find "$APK_DIR" -name "*-unsigned.apk" 2>/dev/null)
          echo "Unsigned APK: $UNSIGNED_APK"
          
          if [ -n "$UNSIGNED_APK" ]; then
            KEYSTORE_PATH=debug.keystore
            KEY_ALIAS=debug
            KEY_PASSWORD=android
            STORE_PASSWORD=android
            
            "$KEYTOOL_PATH" -genkey -v -keystore "$KEYSTORE_PATH" -keyalg RSA -keysize 2048 -validity 10000 -alias "$KEY_ALIAS" -storepass "$STORE_PASSWORD" -keypass "$KEY_PASSWORD" -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"
            
            BASENAME=$(basename "$UNSIGNED_APK" -unsigned.apk)
            SIGNED_APK=$(dirname "$UNSIGNED_APK")/"$BASENAME-signed.apk"
            
            cp "$UNSIGNED_APK" "$SIGNED_APK"
            
            "$APK_SIGNER_PATH" sign --ks "$KEYSTORE_PATH" --ks-pass pass:"$STORE_PASSWORD" --key-pass pass:"$KEY_PASSWORD" --ks-key-alias "$KEY_ALIAS" "$SIGNED_APK"
            
            "$APK_SIGNER_PATH" verify "$SIGNED_APK"
            
            echo "Signed APK: $SIGNED_APK"
            ls -la "$SIGNED_APK"
          else
            echo "No unsigned APK found, checking for existing signed APK"
            find "$APK_DIR" -name "*signed*.apk" 2>/dev/null || echo "No signed APK found"
            
            for apk in $(find "$APK_DIR" -name "*.apk" 2>/dev/null); do
              echo "Verifying: $apk"
              "$APK_SIGNER_PATH" verify "$apk" 2>&1 || echo "Not properly signed"
            done
          fi

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*-signed.apk
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  build-ios:
    runs-on: macos-latest
    if: ${{ vars.ENABLE_IOS_BUILD == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize iOS project
        run: npm run tauri ios init

      - name: Build iOS
        run: npm run tauri ios build -- --export-method development
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: |
            src-tauri/gen/ios/build/Products/**/*.ipa

  upload-to-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-android]
    if: always()
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        if: ${{ needs.build-windows.result == 'success' }}
        with:
          name: windows-artifacts
          path: windows/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        if: ${{ needs.build-macos.result == 'success' }}
        with:
          name: macos-artifacts
          path: macos/

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        if: ${{ needs.build-android.result == 'success' }}
        with:
          name: android-artifacts
          path: android/

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        if: ${{ vars.ENABLE_IOS_BUILD == 'true' && needs.build-ios.result == 'success' }}
        with:
          name: ios-artifacts
          path: ios/

      - name: List all artifacts
        run: |
          echo "=== Windows ==="
          find windows -type f 2>/dev/null || echo "none"
          echo "=== macOS ==="
          find macos -type f 2>/dev/null || echo "none"
          echo "=== Android ==="
          find android -type f 2>/dev/null || echo "none"
          echo "=== iOS ==="
          find ios -type f 2>/dev/null || echo "none"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/**/*.msi
            windows/**/*.exe
            macos/**/*.dmg
            android/**/*.apk
            ios/**/*.ipa
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
