name: Release Build

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/portable/*.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Tauri macOS
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target aarch64-apple-darwin

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: 34.0.0
          ndk: 27.3.13750724
          cmdline-tools: latest

      - name: Setup NDK environment
        run: |
          NDK_VERSION=27.3.13750724
          NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
          if [ ! -d "$NDK_PATH" ]; then
            echo "NDK $NDK_VERSION not found, using available:"
            ls $ANDROID_HOME/ndk/
            NDK_VERSION=$(ls $ANDROID_HOME/ndk/ | sort -V | head -n1)
            NDK_PATH="$ANDROID_HOME/ndk/$NDK_VERSION"
          fi
          echo "Using NDK: $NDK_PATH"
          echo "NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_PATH" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Build Android APK
        run: npm run tauri android build -- --apk

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk

  build-ios:
    runs-on: macos-latest
    if: ${{ vars.ENABLE_IOS_BUILD == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize iOS project
        run: npm run tauri ios init

      - name: Build iOS
        run: npm run tauri ios build -- --export-method development
        env:
          DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          path: |
            src-tauri/gen/ios/build/Products/**/*.ipa

  upload-to-release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-android]
    if: always()
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: windows/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: macos/

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-artifacts
          path: android/

      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        if: ${{ vars.ENABLE_IOS_BUILD == 'true' }}
        with:
          name: ios-artifacts
          path: ios/

      - name: List all artifacts
        run: |
          find windows -type f 2>/dev/null || true
          find macos -type f 2>/dev/null || true
          find android -type f 2>/dev/null || true
          find ios -type f 2>/dev/null || true

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/**/*.msi
            windows/**/*.exe
            windows/**/*.zip
            macos/**/*.dmg
            macos/**/*.app
            android/**/*.apk
            android/**/*.aab
            ios/**/*.ipa
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}